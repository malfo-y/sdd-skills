## Step 7: Verify Against CHECKS.md and Summarize

### 7.1 Verify Each File Against Its Criteria

For each criterion in `ralph/CHECKS.md`, perform a targeted check and fix failures before proceeding.

**config.sh**:
- Check for remaining placeholders
- Check `LLM_TIMEOUT_SECONDS` is defined
- Check `MAX_LLM_FAILURES` is defined
- Check every variable referenced in `PROMPT.md` execution command is defined in `config.sh`

**PROMPT.md**:
- Check anti-recursion warning
- Check `SMOKE_TEST` phase exists
- Check core phases or allowed aliases are present
- Check main execution section includes exact command using config variables
- Check verification section includes exact command or explicit skip
- Check `## Known Errors`
- Check `## action.sh Rules`
- Check self-correction protocol
- Check decision-log read/write rules

**run.sh**:
- Check `--reset`
- Check `LLM_TIMEOUT_SECONDS`
- Check DONE phase detection

**state.md**:
- Check `phase: SETUP`
- Check `iteration: 0`
- Check `__INITIALIZED_AT_UTC__` placeholder is gone

Mark each check ✅ or ❌ in the output. If any criterion fails, fix the generated file before continuing.

### 7.2 Update CHECKS.md with Results

Replace `[ ]` with `[x]` for passing criteria and `[!]` for failing ones, including a short note if a failure was fixed.

### 7.3 Create `results/` Directory and Summarize

Create `ralph/results/`, then print a summary:

```
Ralph loop initialized (verified)!

Files created:
  ralph/CHECKS.md
  ralph/config.sh
  ralph/PROMPT.md
  ralph/run.sh
  ralph/state.md
  ralph/results/

Reference phases:
  SETUP -> SMOKE_TEST -> EXECUTING -> CHECKING -> ANALYZING -> ADJUSTING -> DONE

Next steps:
  1. Review and edit ralph/config.sh
  2. Resume run: bash ralph/run.sh
  3. Fresh restart: bash ralph/run.sh --reset
  4. The loop will run a minimal SMOKE_TEST before the main execution phase
```

If the generated config uses a process-specific debug parameter (for example `MAX_STEPS="10"` for ML), remind the user that it is only for the initial debug run.

