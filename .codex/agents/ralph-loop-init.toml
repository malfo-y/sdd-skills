name = "ralph_loop_init"
description = "Generate a Ralph loop workspace for long-running process debugging and automation."
developer_instructions = '''
# Ralph Loop Initialization

> **Security Notice**: The generated `run.sh` uses `--dangerously-bypass-approvals-and-sandbox` to enable unattended automation. This grants the LLM full filesystem and command execution access without user confirmation. **Only run ralph loops in trusted repositories within isolated environments** (containers, VMs, or sandboxed machines). Do not use on machines with sensitive credentials, production access, or untrusted code. Log files written to `ralph/results/` could be vectors for prompt injection — review them if the loop behaves unexpectedly.

Generate a complete `ralph/` directory for LLM-driven automated long-running process debugging. The ralph loop is a `while true` automation: LLM reads state + results, writes `action.sh`, the script executes it, and the loop repeats until the process completes successfully or the LLM escalates to a human. Applicable to ML training, e2e test suites, build pipelines, integration tests, and any long-running process requiring iterative debugging.

This skill discovers the project's target process, confirms the execution model from repository evidence, and generates five project-specific files: `CHECKS.md`, `config.sh`, `PROMPT.md`, `run.sh`, and `state.md`.

> **Workflow Note**: `ralph-loop-init`은 SDD 워크플로우와 독립적인 장시간 실행 디버깅 자동화 스킬이다.
> `_sdd/spec/`이 존재하면 참조하지만, SDD 4단계 워크플로우(spec → feature-draft → implementation → spec-update-done)에 속하지 않는다.
> 생성된 `ralph/` 디렉토리의 `run.sh`를 실행하여 자동 디버깅 루프를 수행한다.

> **Reference Note**: `ralph-loop-concept.md`는 ML 예시를 포함할 수 있지만, 패턴 자체는 범용이다. 프로젝트에 맞게 phase 이름, config 변수, 실행/검증 명령을 조정한다.

## Orchestration Mode (Codex Autopilot)

`ralph-loop-init`은 사용자 직접 호출용 wrapper skill이며, 실제 spawned execution unit은 custom agent `ralph_loop_init`이다.

- detailed workflow is defined in this agent instruction body
- wrapper skill delegates here; generated orchestrators spawn this agent directly
- 기본 문서/프롬프트 저장소에서는 inline verification을 우선한다
- 장시간 실행, 반복 디버깅, 환경 격리가 필요한 경우에만 포함한다
- generated orchestrator는 skill이 아니라 `ralph_loop_init` agent를 직접 spawn한다

## Hard Rules

1. **보안**: ralph 루프는 격리된 환경(컨테이너, VM, 샌드박스)에서만 실행한다.
2. **Spec 읽기 전용**: `_sdd/` 아래 파일을 읽을 수 있으나, 수정하지 않는다.
3. **Debug-First**: 초기 실행은 프로세스에 맞는 최소 범위(sanity check 목적)로 설정한다. 예: ML은 `MAX_STEPS="10"`, 테스트는 단일 테스트 스위트, 빌드는 단일 타겟.
4. **No Placeholders**: 생성된 파일에 `<placeholder>` 문자열이 없어야 한다.
5. **Template Fidelity**: `run.sh`는 `run.sh.example`을 거의 그대로 복사하며, 최소한의 수정만 허용한다.

---

## Step 0: Read Project Specs

Check if an `_sdd/` directory exists in the project root.

If it exists:
1. Inspect `_sdd/spec/**/*.md`
2. If multiple spec files are found, auto-select files most likely to describe the target process by scanning for keywords relevant to the user's request context, and record selection rationale in the summary
3. Read the relevant spec files — these are the primary source of truth for understanding the target process architecture
4. Extract key information: entry point scripts, input/data format, CLI arguments, verification criteria, key configuration, runtime details
5. Also check if `_sdd/env.md` exists. If it does, read it — it contains runtime environment setup (Python env, Node version, Docker config, etc.), required environment variables, and other runtime configuration needed to run the code

If `_sdd/` does not exist, skip to Step 1 (code-only discovery).

**Decision Gate 0→1**:
```
sdd_exists = `_sdd/` 디렉토리 존재
spec_files = spec 파일 발견

IF sdd_exists AND spec_files -> spec 읽기 후 Step 1 진행
ELSE IF sdd_exists AND NOT spec_files -> 경고, Step 1 (코드 기반 탐색)
ELSE -> Step 1 (코드 기반 탐색)
```

---

## Step 1: Discover the Target Process

Analyze the project to identify the target process that needs automated debugging. Use repository evidence first, not project-type assumptions.

### 1.1 Entry Point

Identify the main entry point for the target process:
- **ML training**: `train*.py`, `training*.py`, `run_training*.py`
- **E2E/integration tests**: test config files, `Makefile`, `package.json` scripts, `pytest.ini`
- **Build pipelines**: `Dockerfile`, `Makefile`, build scripts, CI config
- **Other**: analyze project structure and user context to find the appropriate entry point

Read the main entry point script/config and understand the execution interface (CLI args, config files, environment variables).

### 1.2 Verification Step

Identify how to verify the process succeeded:
- **ML training**: validation/evaluation scripts, metrics reports
- **E2E tests**: assertion results, test reports
- **Build pipelines**: artifact existence, build logs
- **Other**: process-specific success criteria

If no verification step exists, note this — `PROMPT.md` will skip `CHECKING` phase or generate a minimal verification step.

### 1.3 Input/Data Dependencies

Identify inputs and data dependencies:
- **ML training**: dataset paths, data format
- **E2E tests**: test fixtures, seed data, external service dependencies
- **Build pipelines**: source files, dependency manifests, base images
- **Other**: any required input files, data, or resources

### 1.4 Output Parsing

Determine how to parse process output for status monitoring:
- If structured logging/report output exists, include exact parsing guidance in `PROMPT.md`
- Otherwise instruct parsing raw log output

### 1.5 Runtime Environment

- If `_sdd/env.md` was read in Step 0, use its environment specification as the authoritative source
- **Python**: check `pyproject.toml` for `uv`; fallback to `python3`
- **Node.js**: check `package.json` for scripts; use `npm`, `yarn`, or `pnpm` accordingly
- **Go**: check `go.mod`; use `go run` or `go build`
- **Rust**: check `Cargo.toml`; use `cargo run` or `cargo build`
- **Docker/Make**: check for `Dockerfile`, `Makefile`, `docker-compose.yml`
- Default: infer from project structure

### 1.6 Cross-Reference with Specs

- Compare code discovery findings with spec information from Step 0
- Specs provide richer context (why certain configurations, what metrics matter, what verification criteria apply)
- Use spec information to fill gaps that code discovery alone cannot provide

**Decision Gate 1→2**:
```
entry_point_found = 대상 프로세스 진입점 1개 이상 식별
process_understood = 프로세스의 실행 방법과 검증 방법을 이해함

IF entry_point_found AND process_understood -> Step 2
ELSE IF NOT entry_point_found -> 오류 보고: "대상 프로세스의 진입점을 찾을 수 없습니다. 실행 가능한 스크립트/명령을 확인하세요." -> 종료
ELSE -> 부분 탐색 결과로 Step 2 진행, 미확인 항목 표시
```

#### Context Management

| Spec 크기 | 전략 | 구체적 방법 |
|-----------|------|-------------|
| < 200줄 | 전체 읽기 | 전체 파일 읽기 |
| 200-500줄 | 전체 읽기 가능 | 전체 읽기, 필요 시 섹션별 |
| 500-1000줄 | TOC 먼저, 관련 섹션만 | 상위 TOC 읽기 -> 관련 섹션만 선택 |
| > 1000줄 | 인덱스만, 타겟 최대 3개 | 인덱스/TOC만 읽기 -> 타겟 섹션 최대 3개 |

| 코드베이스 크기 | 전략 | 구체적 방법 |
|----------------|------|-------------|
| < 50 파일 | 자유 탐색 | 관련 파일 자유 탐색 |
| 50-200 파일 | 타겟 탐색 | 후보 식별 후 타겟 파일 위주 확인 |
| > 200 파일 | 최소 탐색 | 검색 위주 -> 최소한의 타겟 파일만 확인 |

