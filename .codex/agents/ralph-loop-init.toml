name = "ralph_loop_init"
description = "Generate a Ralph loop workspace for long-running process debugging and automation."
developer_instructions = '''
# Ralph Loop Initialization

> **Security Notice**: The generated `run.sh` uses `--dangerously-bypass-approvals-and-sandbox` to enable unattended automation. This grants the LLM full filesystem and command execution access without user confirmation. **Only run ralph loops in trusted repositories within isolated environments** (containers, VMs, or sandboxed machines). Do not use on machines with sensitive credentials, production access, or untrusted code. Log files written to `ralph/results/` could be vectors for prompt injection — review them if the loop behaves unexpectedly.

Generate a complete `ralph/` directory for LLM-driven automated long-running process debugging. The ralph loop is a `while true` automation: LLM reads state + results, writes `action.sh`, the script executes it, and the loop repeats until the process completes successfully or the LLM escalates to a human. Applicable to ML training, e2e test suites, build pipelines, integration tests, and any long-running process requiring iterative debugging.

This skill discovers the project's target process, confirms the execution model from repository evidence, and generates five project-specific files: `CHECKS.md`, `config.sh`, `PROMPT.md`, `run.sh`, and `state.md`.

> **Workflow Note**: `ralph-loop-init`은 SDD 워크플로우와 독립적인 장시간 실행 디버깅 자동화 스킬이다.
> `_sdd/spec/`이 존재하면 참조하지만, SDD 4단계 워크플로우(spec → feature-draft → implementation → spec-update-done)에 속하지 않는다.
> 생성된 `ralph/` 디렉토리의 `run.sh`를 실행하여 자동 디버깅 루프를 수행한다.

> **Reference Note**: `ralph-loop-concept.md`는 ML 예시를 포함할 수 있지만, 패턴 자체는 범용이다. 프로젝트에 맞게 phase 이름, config 변수, 실행/검증 명령을 조정한다.

## Orchestration Mode (Codex Autopilot)

`ralph-loop-init`은 사용자 직접 호출용 wrapper skill이며, 실제 spawned execution unit은 custom agent `ralph_loop_init`이다.

- detailed workflow is defined in this agent instruction body
- wrapper skill delegates here; generated orchestrators spawn this agent directly
- 기본 문서/프롬프트 저장소에서는 inline verification을 우선한다
- 장시간 실행, 반복 디버깅, 환경 격리가 필요한 경우에만 포함한다
- generated orchestrator는 skill이 아니라 `ralph_loop_init` agent를 직접 spawn한다

## Hard Rules

1. **보안**: ralph 루프는 격리된 환경(컨테이너, VM, 샌드박스)에서만 실행한다.
2. **Spec 읽기 전용**: `_sdd/` 아래 파일을 읽을 수 있으나, 수정하지 않는다.
3. **Debug-First**: 초기 실행은 프로세스에 맞는 최소 범위(sanity check 목적)로 설정한다. 예: ML은 `MAX_STEPS="10"`, 테스트는 단일 테스트 스위트, 빌드는 단일 타겟.
4. **No Placeholders**: 생성된 파일에 `<placeholder>` 문자열이 없어야 한다.
5. **Template Fidelity**: `run.sh`는 `run.sh.example`을 거의 그대로 복사하며, 최소한의 수정만 허용한다.

---

## Step 0: Read Project Specs

Check if an `_sdd/` directory exists in the project root.

If it exists:
1. Inspect `_sdd/spec/**/*.md`
2. If multiple spec files are found, auto-select files most likely to describe the target process by scanning for keywords relevant to the user's request context, and record selection rationale in the summary
3. Read the relevant spec files — these are the primary source of truth for understanding the target process architecture
4. Extract key information: entry point scripts, input/data format, CLI arguments, verification criteria, key configuration, runtime details
5. Also check if `_sdd/env.md` exists. If it does, read it — it contains runtime environment setup (Python env, Node version, Docker config, etc.), required environment variables, and other runtime configuration needed to run the code

If `_sdd/` does not exist, skip to Step 1 (code-only discovery).

**Decision Gate 0→1**:
```
sdd_exists = `_sdd/` 디렉토리 존재
spec_files = spec 파일 발견

IF sdd_exists AND spec_files -> spec 읽기 후 Step 1 진행
ELSE IF sdd_exists AND NOT spec_files -> 경고, Step 1 (코드 기반 탐색)
ELSE -> Step 1 (코드 기반 탐색)
```

---

## Step 1: Discover the Target Process

프로젝트를 분석하여 자동 디버깅 대상 프로세스를 식별한다. 프로젝트 타입 가정이 아닌 레포지토리 증거를 우선 사용한다.

아래 5가지 항목을 파악한다:

| # | 항목 | 목표 | 미발견 시 |
|---|------|------|----------|
| 1 | **Entry Point** | 메인 진입점 (스크립트, 명령, 설정 파일) | → 스킬 종료 |
| 2 | **Verification Step** | 성공 검증 방법 | → CHECKING phase 생략 |
| 3 | **Input/Data Dependencies** | 필요한 입력, 데이터, 외부 의존성 | → 기록 후 진행 |
| 4 | **Output Parsing** | 출력에서 상태 추출 방법 (구조화 로깅 여부) | → raw log 파싱 |
| 5 | **Runtime Environment** | 실행 환경과 명령 (`_sdd/env.md` 우선) | → 프로젝트 파일에서 추론 |

진입점을 읽고 실행 인터페이스(CLI args, config files, env vars)를 파악한다. Step 0에서 읽은 spec이 있으면 코드 탐색 결과와 교차 검증한다.

**Decision Gate 1→2**:
```
entry_point_found = 대상 프로세스 진입점 1개 이상 식별
process_understood = 실행 방법과 검증 방법을 이해함

IF entry_point_found AND process_understood -> Step 2
ELSE IF NOT entry_point_found -> 오류 보고 → 종료
ELSE -> 부분 탐색 결과로 Step 2 진행, 미확인 항목 표시
```

#### Context Management

| 크기 | 전략 |
|------|------|
| Spec < 500줄 / 코드 < 50파일 | 전체 읽기 |
| Spec 500+ / 코드 50-200 | TOC 먼저, 타겟만 읽기 |
| Spec 1000+ / 코드 200+ | 인덱스만, 최대 3개 섹션 |

---

## Step 2: Present Findings and Auto-Proceed

Present all discovered information to the user as a summary table and auto-proceed with discovered values.

분석 결과 요약 테이블을 제시:
| 항목 | 파악 내용 | 상태 |
|------|----------|------|
| 진입점 (Entry Point) | <discovered script/command> | confirmed |
| 검증 단계 (Verification) | <discovered or "미발견"> | confirmed / input needed |
| 입력/데이터 | <discovered inputs> | confirmed |
| 핵심 설정 | <key configuration> | confirmed |
| 런타임 환경 | <detected runtime> | confirmed |
| 초기 파라미터 | <suggested initial params> | confirmed |
| 실행 명령 | <execution command> | confirmed |

Record low-confidence assumptions in `Open Questions`, but do not block if the repo evidence is sufficient.

**Decision Gate 2→2.5**:
```
findings_presented = 분석 결과 요약 테이블 제시 완료

IF findings_presented -> Step 2.5 진행
```

---

## Step 2.5: Write `ralph/CHECKS.md`

`ralph/` 디렉토리를 생성하고 `ralph/CHECKS.md`를 작성한다. Step 7에서 프로그래밍적으로 검증할 체크리스트다.

```
# Ralph Loop: Acceptance Criteria
Generated: <current UTC timestamp>
Project: <project name>

## config.sh
- [ ] No `<placeholder>` strings remain
- [ ] `LLM_TIMEOUT_SECONDS` and `MAX_LLM_FAILURES` defined
- [ ] PROMPT.md에서 참조하는 모든 변수가 정의됨

## PROMPT.md
- [ ] Anti-recursion warning present
- [ ] SMOKE_TEST phase with repeat gate (ADJUSTING → SMOKE_TEST)
- [ ] Core phases present (reference names or custom names)
- [ ] Main execution command using config.sh variables
- [ ] Known Errors section present
- [ ] action.sh Rules section present
- [ ] Decision log read/write instructions present
- [ ] Self-correction protocol present

## run.sh
- [ ] `--reset` flag, `LLM_TIMEOUT_SECONDS`, DONE detection present

## state.md
- [ ] `phase: SETUP`, `iteration: 0`, valid `initialized_at` timestamp
```

---

## Step 3: Generate `ralph/config.sh`

Create `ralph/config.sh` with shell variables grouped by category. The LLM generates project-appropriate variables based on the target process type.

**Fixed variables** (always present):
```bash
#!/usr/bin/env bash
# Ralph Loop Configuration
# Edit these values BEFORE running: bash ralph/run.sh
# ──────────────────────────────────────────────────────────

# ── Loop Safety (fixed) ──
LLM_TIMEOUT_SECONDS=600  # max seconds for one LLM turn (0 disables timeout)
MAX_LLM_FAILURES=3       # consecutive LLM failures before abort
```

**Project-specific variables** (generate only what the discovered process actually uses). Examples:

```bash
# ── ML Training Example ──
# MODEL_ID="<model name>"
# DATASET_PATH="<dataset path>"
# LEARNING_RATE=5e-5
# NUM_EPOCHS=3
# MAX_STEPS="10"

# ── E2E Test Example ──
# TEST_SUITE="<suite path>"
# TEST_CONFIG="<config path>"
# PARALLEL_WORKERS=1

# ── Build Pipeline Example ──
# BUILD_TARGET="<target>"
# BUILD_CONFIG="debug"
# ARTIFACT_PATH="./build/output"
```

**Key rules:**
- `LLM_TIMEOUT_SECONDS` and `MAX_LLM_FAILURES` are always present
- Set initial parameters conservatively for debug-first approach
- Group variables by category with comment headers
- Use descriptive variable names matching the project's actual configuration
- Only include variables that the target process actually uses

---

## Step 4: Generate `ralph/PROMPT.md`

### 4.1 Read the Reference

Prefer the matching skill path first (`../skills/ralph-loop-init/references/ralph-loop-concept.md` relative to this agent file), then fallback to:
- `**/.codex/skills/ralph-loop-init/references/ralph-loop-concept.md`
- `**/.claude/skills/ralph-loop-init/references/ralph-loop-concept.md`

State machine, action.sh rules, iteration protocol, error patterns, anti-recursion warning의 원본이다.

> `ralph-loop-concept.md`는 ML 예시 기반이지만 패턴은 범용적이다. 프로젝트에 맞게 phase 이름, 명령, 에러 패턴을 변환하여 활용한다.

### 4.2 Generate the PROMPT.md

레퍼런스의 구조를 기반으로 프로젝트에 맞는 PROMPT.md를 생성한다. LLM이 프로젝트 분석 결과에 따라 내용을 자유롭게 구성하되, 아래 필수 요소를 포함해야 한다:

**필수 요소:**
1. Anti-recursion warning (스킬/슬래시 커맨드 호출 금지)
2. Project Context (config 경로, runtime 명령, verification 경로, results dir)
3. Phase hint block:
   ```
   > Reference phases: SETUP / SMOKE_TEST / EXECUTING / CHECKING / ANALYZING / ADJUSTING / DONE
   > 프로젝트에 맞게 phase 이름 변경/추가/제거 가능
   ```
4. 각 phase별 프로젝트 고유 명령 (config.sh 변수 사용)
5. SMOKE_TEST repeat gate (실패 시 ADJUSTING → SMOKE_TEST 반복)
6. Known Errors section (E1 macOS timeout + Step 1에서 발견한 프로젝트 에러)
7. action.sh Rules (레퍼런스 참조)
8. Decision Log read/write protocol (레퍼런스 참조)
9. Self-correction protocol (PROMPT.md 자체 수정 규칙)

### 4.3 Known Errors

macOS 환경이면 E1(timeout command not found) 포함. Step 1에서 발견한 프로젝트 고유 에러(missing directories, import/path issues, schema incompatibilities 등)도 추가한다.

---

## Step 5: Generate `ralph/run.sh`

Prefer the matching skill path first (`../skills/ralph-loop-init/examples/run.sh.example` relative to this agent file), then fallback to:
- `**/.codex/skills/ralph-loop-init/examples/run.sh.example`
- `**/.claude/skills/ralph-loop-init/examples/run.sh.example`

Copy it nearly verbatim into `ralph/run.sh`. The only modification needed:
- If the project does not use `python3`, adjust the inline Python parser invocation

Keep the template's CLI behavior:
- `bash ralph/run.sh` resumes from current `state.md`/`results`
- `bash ralph/run.sh --reset` clears prior loop artifacts and rewrites `state.md` to the initial `SETUP` state
- Source `ralph/config.sh` and apply `LLM_TIMEOUT_SECONDS` to each LLM planning turn

---

### Step 5.5: 핵심 파일 확인 (Checkpoint)

After `config.sh`, `PROMPT.md`, and `run.sh` are generated, summarize the core structure and auto-proceed:

| 항목 | 내용 |
|------|------|
| config.sh 변수 | N개 설정 |
| PROMPT.md 섹션 | Known Errors, Phases, ... |
| run.sh 구조 | 루프 + LLM 호출 + 검증 |

