## Progressive Disclosure (완료 시)

1. 완료 요약 테이블 제시:
   | 항목 | 내용 |
   |------|------|
   | 생성 파일 | 5개 + results/ |
   | CHECKS.md 상태 | N/N 통과 |
   | 감지 런타임 | Python / Node / Go / ... |
   | Phase 구성 | SETUP -> SMOKE_TEST -> ... -> DONE |

2. 내부 자동 처리:
   - `PROMPT.md` 핵심 섹션 확인
   - `config.sh` 변수 구조 확인
   - 검증 완료 후 종료

